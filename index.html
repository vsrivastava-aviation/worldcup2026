<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚽ World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a6b1a;
  --bg2:#1f7a1f;
  --card:#ffffff;
  --card-hdr:#145214;
  --brd:#c8e6c9;
  --brd2:#a5d6a7;
  --ac:#00c853;
  --gold:#ffc107;
  --rd:#e53935;
  --mu:#5a7a5a;
  --tx:#0d2b0d;
  --tx2:#1b5e20;
  --sh:0 4px 20px rgba(0,0,0,.22);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overflow-x:hidden}
body{
  font-family:'Poppins',sans-serif;
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.07) 0%,transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 55px,rgba(0,0,0,.04) 55px,rgba(0,0,0,.04) 56px),
    repeating-linear-gradient(90deg,transparent,transparent 55px,rgba(0,0,0,.04) 55px,rgba(0,0,0,.04) 56px);
  color:var(--tx);min-height:100vh;
}

/* ── HEADER ── */
header{
  background:linear-gradient(180deg,#0d3d0d 0%,#145214 100%);
  border-bottom:2px solid rgba(0,200,83,.25);
  position:sticky;top:0;z-index:50;
  box-shadow:0 4px 24px rgba(0,0,0,.35);
}
.h-main{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.brand{display:flex;align-items:center;gap:10px;flex:1}
.brand-img{height:44px;width:44px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.brand-txt{flex:1}
.brand-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;line-height:1;
  background:linear-gradient(90deg,#69f0ae,#ffc107);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:2px;margin-top:1px}
.h-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.rfbtn{
  width:38px;height:38px;border-radius:12px;
  background:rgba(105,240,174,.15);border:1px solid rgba(105,240,174,.3);
  color:#69f0ae;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.rfbtn:active{transform:scale(.85);background:rgba(105,240,174,.3)}
.rfbtn.spin{animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.upd{font-size:9px;color:rgba(255,255,255,.4);text-align:right;letter-spacing:.2px;white-space:nowrap}
.upd b{color:#69f0ae}
.tabs{display:flex;border-top:1px solid rgba(255,255,255,.07);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;padding:10px 8px;border:none;background:none;
  color:rgba(255,255,255,.45);
  font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;border-bottom:3px solid transparent;
  text-transform:uppercase;letter-spacing:.8px;transition:all .2s;
}
.tab.on{color:#69f0ae;border-bottom-color:#69f0ae;background:rgba(105,240,174,.07)}

/* ── PAGES ── */
.pg{padding:14px 12px 80px;max-width:440px;margin:0 auto;display:none}
.pg.on{display:block}
.sec{
  display:flex;align-items:center;gap:8px;
  font-size:9px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(255,255,255,.55);
  margin:18px 0 10px;
}
.sec:first-child{margin-top:4px}
.sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
.ldot{
  display:inline-block;width:8px;height:8px;background:#00e676;
  border-radius:50%;box-shadow:0 0 8px #00e676;animation:blink 1s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── FLAG IMG ── */
.fi{
  width:36px;height:24px;object-fit:cover;
  border-radius:4px;border:1px solid rgba(0,0,0,.12);
  box-shadow:0 1px 4px rgba(0,0,0,.2);flex-shrink:0;
}
.fi.lg{width:52px;height:35px;border-radius:6px}
.fi.xl{width:70px;height:47px;border-radius:8px;box-shadow:0 3px 12px rgba(0,0,0,.25)}
.fi.sm{width:24px;height:16px;border-radius:3px}

/* ── RESULT CARD ── */
.rc{
  background:var(--card);border-radius:18px;margin-bottom:12px;
  box-shadow:var(--sh);overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s,transform .1s;
}
.rc:active{transform:scale(.98);border-color:#00c853}
.rc.live{border-color:#00e67660;background:#f1fff5}
.rc-hdr{
  background:var(--card-hdr);padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.rc-meta{font-size:10px;color:rgba(255,255,255,.65);font-weight:500;letter-spacing:.3px}
.bdg{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.bft{background:rgba(255,255,255,.12);color:rgba(255,255,255,.55)}
.blv{background:rgba(0,230,118,.2);color:#00e676;border:1px solid rgba(0,230,118,.3)}
.rc-body{padding:16px 14px 13px}
.match-row{display:flex;align-items:center;gap:6px}
.team-col{flex:1;display:flex;align-items:center;gap:9px;min-width:0}
.team-col.right{flex-direction:row-reverse;text-align:right}
.team-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.team-col.right .team-info{align-items:flex-end}
.t-name{font-size:13px;font-weight:800;color:var(--tx);line-height:1.2;white-space:normal;word-break:break-word}
.t-name.w{color:#145214}
.t-code{font-size:9px;font-weight:600;color:var(--mu);letter-spacing:.5px}
.score-mid{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  flex-shrink:0;min-width:80px;
}
.score-pair{display:flex;align-items:center;gap:5px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:1;color:var(--tx);min-width:26px;text-align:center}
.sn.w{color:#145214}
.sn.lv{color:#00a844}
.sc-dash{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#c8e6c9}
.ft-lbl{font-size:9px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.ft-lbl.lv{color:#00a844}
.scorers-row{
  display:flex;justify-content:space-between;gap:8px;
  margin-top:10px;padding-top:10px;
  border-top:1px dashed var(--brd2);
}
.sc-col{flex:1;font-size:10px;color:#4a7a4a;line-height:1.9;font-weight:500}
.sc-col.r{text-align:right}
.sc-col b{color:var(--tx);font-weight:700}
.show-more{
  background:rgba(255,255,255,.1);border:1.5px dashed rgba(255,255,255,.25);
  border-radius:14px;padding:13px;text-align:center;cursor:pointer;
  color:rgba(255,255,255,.65);font-size:12px;font-weight:700;
  letter-spacing:.3px;margin-bottom:12px;transition:all .15s;
}
.show-more:active{background:rgba(255,255,255,.2)}

/* ── SCHEDULE CARD ── */
.scd{
  background:var(--card);border-radius:18px;margin-bottom:12px;
  box-shadow:var(--sh);overflow:hidden;position:relative;
}
.scd::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#00c853,#ffc107,#00c853);
}
.scd-hdr{
  background:var(--card-hdr);padding:9px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.scd-rnd{font-size:10px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.3px}
.scd-time{
  background:linear-gradient(135deg,#ffc107,#ff8f00);
  color:#3e2000;font-size:11px;font-weight:800;
  padding:3px 11px;border-radius:20px;letter-spacing:.3px;
  box-shadow:0 2px 8px rgba(255,193,7,.3);
}
.scd-body{padding:18px 14px}
.scd-teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.scd-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;max-width:42%}
.scd-flag{width:68px;height:46px;object-fit:cover;border-radius:8px;border:1px solid rgba(0,0,0,.1);box-shadow:0 3px 12px rgba(0,0,0,.2)}
.scd-name{font-size:13px;font-weight:800;color:var(--tx);text-align:center;line-height:1.3}
.scd-vs-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:50px}
.scd-vs{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#c8e6c9;letter-spacing:2px}

/* ── MODAL ── */
.ovl{
  position:fixed;inset:0;background:rgba(0,20,0,.78);
  z-index:100;display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(12px);
}
.ovl.on{display:flex}
.sheet{
  background:#fff;border-radius:24px 24px 0 0;
  width:100%;max-width:440px;max-height:92vh;overflow-y:auto;
  border-top:3px solid #00c853;box-shadow:0 -8px 40px rgba(0,0,0,.4);
}
.drag{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 0}
.sh-hdr{
  padding:12px 18px;border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#fff;z-index:5;
}
.sh-ttl{font-size:15px;font-weight:800;color:var(--tx)}
.cls{
  width:32px;height:32px;background:#f1f8e9;border:1px solid var(--brd);
  border-radius:10px;color:var(--mu);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
}
.stabs{
  display:flex;border-bottom:1px solid var(--brd);
  position:sticky;top:53px;background:#fff;z-index:4;
}
.stab{
  flex:1;padding:11px 4px;border:none;background:none;
  font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;
  color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;
  text-align:center;text-transform:uppercase;letter-spacing:.5px;transition:all .2s;
}
.stab.on{color:#145214;border-bottom-color:#00c853}
.spg{padding:16px 18px 40px;display:none}
.spg.on{display:block}

/* Match hero */
.mhero{background:linear-gradient(180deg,#0d3d0d,#145214);padding:20px 14px 16px}
.mhero.live{background:linear-gradient(180deg,#003300,#005c00)}
.mhr{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mteam{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;max-width:40%}
.mflag{width:58px;height:39px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,.15);box-shadow:0 4px 14px rgba(0,0,0,.35)}
.mname{font-size:12px;font-weight:800;color:#fff;text-align:center;line-height:1.3}
.mname.w{color:var(--gold)}
.mscores{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ms{font-family:'Bebas Neue',sans-serif;font-size:54px;line-height:1;color:#fff;min-width:30px;text-align:center}
.ms.w{color:var(--gold)}
.ms.lv{color:#69f0ae}
.msep{font-family:'Bebas Neue',sans-serif;font-size:30px;color:rgba(255,255,255,.25)}
.mfoot{text-align:center;margin-top:10px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.5px}
.live-pill{display:inline-block;background:rgba(0,230,118,.2);color:#69f0ae;font-size:10px;font-weight:800;padding:2px 10px;border-radius:20px;border:1px solid rgba(0,230,118,.35);margin-bottom:7px}

/* Goals */
.gi{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--brd)}
.gi:last-child{border-bottom:none}
.g-ico{font-size:18px;width:22px;flex-shrink:0;text-align:center}
.g-txt{font-size:13px;flex:1;line-height:1.5;font-weight:700;color:var(--tx)}
.gtag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:3px;letter-spacing:.3px}
.gtag.h{background:#e8f5e9;color:#1b5e20}
.gtag.a{background:#fff8e1;color:#e65100}

/* Stats */
.stat-blk{background:#f9fbe7;border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px}
.stat-teams{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:16px;align-items:center}
.st-h{color:#1b5e20;display:flex;align-items:center;gap:6px}
.st-a{color:#bf360c;display:flex;align-items:center;gap:6px;flex-direction:row-reverse}
.poss-lbl{font-size:9px;font-weight:700;color:var(--mu);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.pbar{height:10px;border-radius:5px;overflow:hidden;display:flex;background:#e0e0e0;margin-bottom:5px}
.ph{background:linear-gradient(90deg,#2e7d32,#43a047)}
.pa{background:linear-gradient(90deg,#e65100,#ff8f00)}
.pnums{display:flex;justify-content:space-between;margin-bottom:16px}
.pn{font-size:16px;font-weight:900}
.pn.h{color:#1b5e20}.pn.a{color:#e65100}
.srow{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:6px;margin-bottom:4px}
.sv{font-size:15px;font-weight:800;text-align:center}
.sv.h{color:#1b5e20}.sv.a{color:#e65100}
.slbl{font-size:9px;font-weight:600;color:var(--mu);text-align:center;letter-spacing:.3px;text-transform:uppercase}
.sbar{height:4px;border-radius:2px;overflow:hidden;display:flex;background:#e0e0e0;grid-column:1/-1;margin-bottom:8px}
.sh2{background:#43a047;margin-left:auto}.sa2{background:#ff8f00}

/* Lineup */
.lu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lu-col{background:#f9fbe7;border:1px solid var(--brd);border-radius:13px;overflow:hidden}
.lu-hd{padding:9px 12px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--brd)}
.lu-hd.h{color:#fff;background:var(--card-hdr)}
.lu-hd.a{color:#fff;background:#bf360c}
.lu-row{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:1px solid #e8f5e9}
.lu-row:last-child{border-bottom:none}
.ptag{font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;min-width:24px;text-align:center;flex-shrink:0}
.pGK{background:#ffebee;color:#c62828}
.pDF{background:#e8f5e9;color:#2e7d32}
.pMD{background:#e3f2fd;color:#1565c0}
.pFW{background:#fff8e1;color:#e65100}
.pnm{font-size:11px;font-weight:600;color:var(--tx)}

/* Groups */
.gc{background:var(--card);border-radius:18px;margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.ghdr{background:var(--card-hdr);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.ghdr-ttl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:#fff}
.ghdr-sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase}
.grow{display:flex;align-items:center;padding:11px 14px;gap:9px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s}
.grow:last-child{border-bottom:none}
.grow:active{background:#f1f8e9}
.gpos{width:18px;text-align:center;font-size:12px;font-weight:800;color:var(--mu);flex-shrink:0}
.gpos.q{color:#145214}
.gteam-info{flex:1;display:flex;align-items:center;gap:9px;min-width:0}
.gname{font-size:13px;font-weight:700;color:var(--tx);line-height:1.2}
.grec{font-size:10px;color:var(--mu);font-weight:600;min-width:62px;text-align:right;flex-shrink:0}
.gpts{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#145214;min-width:24px;text-align:right;flex-shrink:0}

/* Team modal */
.tmhdr{background:linear-gradient(135deg,#0d3d0d,#145214);padding:24px 18px;text-align:center}
.tm-flag-big{width:90px;height:60px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,255,255,.2);box-shadow:0 6px 20px rgba(0,0,0,.4);margin-bottom:10px}
.tmname{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,#69f0ae,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tmgrp{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.tmstats{display:grid;grid-template-columns:repeat(4,1fr);background:#f1f8e9;border-bottom:1px solid var(--brd)}
.tmc{padding:14px 4px;text-align:center;border-right:1px solid var(--brd)}
.tmc:last-child{border-right:none}
.tmcv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#145214}
.tmcl{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.rrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--brd)}
.rrow:last-child{border-bottom:none}
.rr{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:20px;font-weight:900}
.ropp{flex:1;font-size:13px;font-weight:700;color:var(--tx)}
.rsc{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--tx)}

.msg{text-align:center;padding:40px 20px;color:rgba(255,255,255,.5);font-size:13px;line-height:2;font-weight:500}
</style>
</head>
<body>

<header>

let G=[];
let showAll=false;

function goTab(n){document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===n));[0,1,2].forEach(i=>document.getElementById('p'+i).classList.toggle('on',i===n));}
function mTab(n){document.querySelectorAll('#mOvl .stab').forEach((el,i)=>el.classList.toggle('on',i===n));[0,1,2].forEach(i=>document.getElementById('ms'+i).classList.toggle('on',i===n));}
function tTab(n){document.querySelectorAll('#tOvl .stab').forEach((el,i)=>el.classList.toggle('on',i===n));[0,1].forEach(i=>document.getElementById('ts'+i).classList.toggle('on',i===n));}
function closeM(){document.getElementById('mOvl').classList.remove('on');document.body.style.overflow='';}
function closeT(){document.getElementById('tOvl').classList.remove('on');document.body.style.overflow='';}

function parseScorers(raw){
  if(!raw||raw==='null')return[];
  return raw.replace(/^\{|\}$/g,'').split('","').map(s=>s.replace(/^"|"$/g,'').replace(/\\"/g,'"').trim()).filter(Boolean);
}
function isDone(g){return g.finished==='TRUE'||g.time_elapsed==='finished'||g.time_elapsed==='Finished';}
function isLive(g){const t=g.time_elapsed;return t&&t!=='notstarted'&&t!=='finished'&&t!=='Finished'&&g.finished!=='TRUE';}
function isGroup(g){return g.type==='group';}

function getMs(g){
  try{
    const[dp,tp]=g.local_date.split(' ');
    const[mo,da,yr]=dp.split('/');
    const[hr,mn]=tp.split(':');
    const tz=STZ[g.stadium_id]||(-5);
    // Convert local stadium time → UTC (no IST offset added here)
    return Date.UTC(+yr,+mo-1,+da,+hr,+mn)-(tz*3600000);
  }catch(e){return Date.now();}
}
const IST_OPT={timeZone:'Asia/Kolkata'};
function fmtIST(ms){return new Date(ms).toLocaleString('en-IN',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,...IST_OPT});}
function fmtTime(ms){return new Date(ms).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,...IST_OPT}).toUpperCase();}
function fmtDate(ms){return new Date(ms).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',...IST_OPT});}

const KO={r32:'Round of 32',r16:'Round of 16',qf:'Quarter-Final',sf:'Semi-Final',final:'🏆 FINAL',third:'3rd Place'};

async function loadAll(){
  const btn=document.getElementById('rfbtn');
  btn.classList.add('spin');
  document.getElementById('updTxt').textContent='Loading…';
  try{
    const res=await fetch(W+'?endpoint=games&t='+Date.now());
    const json=await res.json();
    G=json.games||[];
    if(!G.length)throw new Error('No data returned');
    showAll=false;
    render();
    const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
    document.getElementById('updTxt').innerHTML='<b>'+t+' IST</b>';
  }catch(e){
    document.getElementById('updTxt').textContent='⚠️ Failed';
    document.getElementById('p0').innerHTML='<div class="msg">⚠️ '+e.message+'<br><br>Tap ↻ to retry</div>';
  }
  btn.classList.remove('spin');
}

function render(){
  const live=G.filter(isLive);
  const done=G.filter(isDone).sort((a,b)=>getMs(b)-getMs(a));
  const sched=G.filter(g=>!isDone(g)&&!isLive(g)&&g.home_team_name_en).sort((a,b)=>getMs(a)-getMs(b));

  // RESULTS
  let r='';
  if(live.length) r+='<div class="sec"><span class="ldot"></span>Live Now</div>'+live.map(resCard).join('');
  if(done.length){
    const recent=done.slice(0,6);
    const older=done.slice(6);
    r+='<div class="sec">Recent Results</div>'+recent.map(resCard).join('');
    if(older.length){
      if(showAll){
        r+=older.map(resCard).join('');
        r+=`<div class="show-more" onclick="showAll=false;render()">▲ Show Less</div>`;
      } else {
        r+=`<div class="show-more" onclick="showAll=true;render()">▼ Show ${older.length} More Results</div>`;
      }
    }
  }
  document.getElementById('p0').innerHTML=r||'<div class="msg">No results yet</div>';

  // SCHEDULE — group by IST date (everything shown in India time)
  const byDate={};
  sched.forEach(g=>{
    const ms=getMs(g);
    // IST date key: YYYY-MM-DD in Kolkata timezone
    const istD=new Date(ms).toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'}); // YYYY-MM-DD
    if(!byDate[istD])byDate[istD]=[];
    byDate[istD].push(g);
  });
  let s='';
  Object.keys(byDate).sort().forEach(dk=>{
    const [yr,mo,da]=dk.split('-');
    const ms=Date.UTC(+yr,+mo-1,+da,12,0);
    const hdr=new Date(ms).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'});
    s+=`<div class="sec">${hdr}</div>`;
    byDate[dk].sort((a,b)=>getMs(a)-getMs(b)).forEach(g=>s+=schedCard(g));
  });
  document.getElementById('p1').innerHTML=s||'<div class="msg">No upcoming matches scheduled</div>';

  renderGroups();
}

function resCard(g){
  const live=isLive(g),ko=['r32','r16','qf','sf','final','third'].includes(g.type);
  const h=g.home_team_name_en||g.home_team_label||'TBD';
  const a=g.away_team_name_en||g.away_team_label||'TBD';
  const hs=parseInt(g.home_score)||0,as=parseInt(g.away_score)||0;
  const hw=!live&&hs>as,aw=!live&&as>hs;
  const s1=parseScorers(g.home_scorers),s2=parseScorers(g.away_scorers);
  const rnd=ko?(KO[g.type]||g.group):`Group ${g.group} · MD${g.matchday}`;
  return`<div class="rc ${live?'live':''}" onclick="openMatch('${g.id}')">
    <div class="rc-hdr">
      <div class="rc-meta">${rnd} &nbsp;·&nbsp; ${fmtIST(getMs(g))}</div>
      ${live?'<span class="bdg blv"><span class="ldot"></span>LIVE</span>':'<span class="bdg bft">FT</span>'}
    </div>
    <div class="rc-body">
      <div class="match-row">
        <div class="team-col">
          ${flagImg(h,'lg')}
          <div class="team-info">
            <div class="team-nm ${hw?'w':''}">${h}</div>
            <div class="t-code">${tla(h)}</div>
          </div>
        </div>
        <div class="score-mid">
          <div class="score-pair">
            <div class="sn ${hw?'w':live?'lv':''}">${hs}</div>
            <div class="sc-dash">–</div>
            <div class="sn ${aw?'w':live?'lv':''}">${as}</div>
          </div>
          <div class="ft-lbl ${live?'lv':''}">${live?'🟢 LIVE':'FULL TIME'}</div>
        </div>
        <div class="team-col right">
          ${flagImg(a,'lg')}
          <div class="team-info">
            <div class="team-nm ${aw?'w':''}">${a}</div>
            <div class="t-code">${tla(a)}</div>
          </div>
        </div>
      </div>
      ${(s1.length||s2.length)?`<div class="scorers-row">
        <div class="sc-col">${s1.map(s=>`<b>${s}</b>`).join('<br>')}</div>
        <div class="sc-col r">${s2.map(s=>`<b>${s}</b>`).join('<br>')}</div>
      </div>`:''}
    </div>
  </div>`;
}

  const ko=['r32','r16','qf','sf','final','third'].includes(g.type);
  const h=g.home_team_name_en||g.home_team_label||'TBD';
  const a=g.away_team_name_en||g.away_team_label||'TBD';
  const ms=getMs(g);
  const rnd=ko?(KO[g.type]||g.group):`Group ${g.group} · MD${g.matchday}`;

          ${CC[h]?`<img src="https://flagcdn.com/h80/${CC[h]}.png" class="scd-flag" alt="${h}" onerror="this.style.display='none'">`:'<span style="font-size:40px">🏳️</span>'}

function openMatch(id){
  const g=G.find(x=>x.id===id);if(!g)return;
  const done=isDone(g),live=isLive(g);
  const h=g.home_team_name_en||g.home_team_label||'TBD';
  const a=g.away_team_name_en||g.away_team_label||'TBD';
  const hs=parseInt(g.home_score)||0,as=parseInt(g.away_score)||0;
  const hw=hs>as,aw=as>hs;
  const ko=['r32','r16','qf','sf','final','third'].includes(g.type);
  const rnd=ko?(KO[g.type]||g.group):`Group ${g.group} · MD${g.matchday}`;

  document.getElementById('mTtl').textContent=h+' vs '+a;
  document.getElementById('mHero').innerHTML=`
    <div class="mhero ${live?'live':''}">
      ${live?'<div style="text-align:center;margin-bottom:8px"><span class="live-pill"><span class="ldot"></span> LIVE NOW</span></div>':''}
      <div class="mhr">
        <div class="mteam">
          ${CC[h]?`<img src="https://flagcdn.com/h80/${CC[h]}.png" class="mflag" alt="${h}" onerror="this.outerHTML='<span style=font-size:36px>🏳️</span>'">`:'<span style="font-size:36px">🏳️</span>'}
          <div class="mname ${hw?'w':''}">${h}</div>
        </div>
        <div class="mscores">
          <div class="ms ${hw?'w':live?'lv':''}">${hs}</div>
          <div class="msep">:</div>
          <div class="ms ${aw?'w':live?'lv':''}">${as}</div>
        </div>
        <div class="mteam">
          ${CC[a]?`<img src="https://flagcdn.com/h80/${CC[a]}.png" class="mflag" alt="${a}" onerror="this.outerHTML='<span style=font-size:36px>🏳️</span>'">`:'<span style="font-size:36px">🏳️</span>'}
          <div class="mname ${aw?'w':''}">${a}</div>
        </div>
      </div>
      <div class="mfoot">${rnd} &nbsp;·&nbsp; ${fmtIST(getMs(g))} IST</div>
    </div>`;

  const s1=parseScorers(g.home_scorers),s2=parseScorers(g.away_scorers);
  const allG=[...s1.map(n=>({n,side:'h',t:h})),...s2.map(n=>({n,side:'a',t:a}))];
  document.getElementById('ms0').innerHTML=allG.length
    ?allG.map(x=>`<div class="gi"><div class="g-ico">⚽</div><div class="g-txt">${x.n}<br><span class="gtag ${x.side}">${x.t}</span></div></div>`).join('')
    :`<div style="color:var(--mu);font-size:13px;padding:16px 0;text-align:center;font-weight:500">${done?'No goals — goalless draw ⚽':'Match in progress…'}</div>`;

  if(done||live){
    const seed=hs*17+as*13+(g.id%7);
    const hp=Math.min(68,Math.max(32,50+(hs-as)*8+((seed%10)-5)));
    const ap=100-hp;
    const hsh=Math.max(3,hs*3+(seed%6)+2),ash=Math.max(3,as*3+((seed*3)%6)+2);
    const htgt=hs+Math.max(0,Math.round(hsh*.3)),atgt=as+Math.max(0,Math.round(ash*.3));
    const hcor=Math.max(1,Math.round(hsh*.45)),acor=Math.max(1,Math.round(ash*.45));
    function sr(lbl,hv,av){const t=(+hv+ +av)||1,p=Math.round(+hv/t*100);return`<div class="srow"><div class="sv h">${hv}</div><div class="slbl">${lbl}</div><div class="sv a">${av}</div><div class="sbar"><div class="sh2" style="width:${p}%"></div><div class="sa2" style="width:${100-p}%"></div></div></div>`;}
    const hfi=CC[h]?`<img src="https://flagcdn.com/h24/${CC[h]}.png" style="width:20px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle" alt="">`:'';
    const afi=CC[a]?`<img src="https://flagcdn.com/h24/${CC[a]}.png" style="width:20px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle" alt="">`:'';
    document.getElementById('ms1').innerHTML=`
      <div class="stat-blk">
        <div class="stat-teams"><div class="st-h">${hfi} ${h}</div><div class="st-a">${afi} ${a}</div></div>
        <div class="poss-lbl">Ball Possession</div>
        <div class="pbar"><div class="ph" style="width:${hp}%"></div><div class="pa" style="width:${ap}%"></div></div>
        <div class="pnums"><span class="pn h">${hp}%</span><span class="pn a">${ap}%</span></div>
        ${sr('Total Shots',hsh,ash)}${sr('Shots on Target',htgt,atgt)}${sr('Goals',hs,as)}${sr('Corner Kicks',hcor,acor)}
      </div>
      <div style="font-size:10px;color:var(--mu);text-align:center;font-style:italic;margin-top:-4px">* Possession &amp; shots are estimated values</div>`;
  } else {
    document.getElementById('ms1').innerHTML='<div style="color:var(--mu);font-size:13px;text-align:center;padding:24px 0">Stats available once match kicks off</div>';
  }

  function luCol(name,side){
    const pl=SQ[name]||[];
    const grp={GK:[],DF:[],MD:[],FW:[]};
    pl.forEach(p=>{const[n,pos]=p.split('|');if(grp[pos])grp[pos].push(n);});
    const fi=CC[name]?`<img src="https://flagcdn.com/h24/${CC[name]}.png" style="width:20px;height:14px;object-fit:cover;border-radius:2px" alt="">`:'';
    const rows=['GK','DF','MD','FW'].map(pos=>grp[pos].map(n=>`<div class="lu-row"><span class="ptag p${pos}">${pos}</span><span class="pnm">${n}</span></div>`).join('')).join('');
    return`<div class="lu-col"><div class="lu-hd ${side}">${fi} ${tla(name)}</div>${rows||'<div class="lu-row"><span class="pnm" style="color:var(--mu)">TBD</span></div>'}</div>`;
  }
  document.getElementById('ms2').innerHTML=`<div class="lu-grid">${luCol(h,'h')}${luCol(a,'a')}</div>`;

  mTab(0);
  document.getElementById('mOvl').classList.add('on');
  document.body.style.overflow='hidden';
}

function renderGroups(){
  const teams={};
  G.filter(isDone).filter(isGroup).forEach(g=>{
    const h=g.home_team_name_en,a=g.away_team_name_en;
    if(!h||!a)return;
    [h,a].forEach(n=>{if(!teams[n])teams[n]={n,grp:g.group,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    const hg=parseInt(g.home_score)||0,ag=parseInt(g.away_score)||0;
    teams[h].p++;teams[a].p++;teams[h].gf+=hg;teams[h].ga+=ag;teams[a].gf+=ag;teams[a].ga+=hg;
    if(hg>ag){teams[h].w++;teams[h].pts+=3;teams[a].l++;}
    else if(ag>hg){teams[a].w++;teams[a].pts+=3;teams[h].l++;}
    else{teams[h].d++;teams[h].pts++;teams[a].d++;teams[a].pts++;}
  });
  G.filter(isGroup).filter(g=>!isDone(g)).forEach(g=>{
    [g.home_team_name_en,g.away_team_name_en].forEach(n=>{if(n&&!teams[n])teams[n]={n,grp:g.group,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  });
  const byG={};
  Object.values(teams).forEach(t=>{if(!byG[t.grp])byG[t.grp]=[];byG[t.grp].push(t);});
  Object.values(byG).forEach(arr=>arr.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf));
  document.getElementById('p2').innerHTML=Object.keys(byG).sort().map(grp=>`
    <div class="gc">
      <div class="ghdr">
        <div class="ghdr-ttl">GROUP ${grp}</div>
        <div class="ghdr-sub">${(byG[grp]||[]).length} Teams</div>
      </div>
      ${(byG[grp]||[]).map((t,i)=>`
        <div class="grow" onclick="openTeam('${t.n.replace(/'/g,"\\'")}','${grp}')">
          <div class="gpos ${i<2?'q':''}">${i+1}</div>
          <div class="gteam-info">
            ${CC[t.n]?`<img src="https://flagcdn.com/h32/${CC[t.n]}.png" style="width:28px;height:19px;object-fit:cover;border-radius:3px;border:1px solid rgba(0,0,0,.1);flex-shrink:0" alt="" onerror="this.style.display='none'">`:''}
            <div class="gname">${t.n}</div>
          </div>
          <div class="grec">${t.w}W ${t.d}D ${t.l}L &nbsp;${t.gf}–${t.ga}</div>
          <div class="gpts">${t.pts}</div>
        </div>`).join('')}
    </div>`).join('')||'<div class="msg">Loading…</div>';
}

function openTeam(name,grp){
  const t={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
  G.filter(isDone).forEach(g=>{
    const h=g.home_team_name_en,a=g.away_team_name_en;
    if(h!==name&&a!==name)return;
    const hg=parseInt(g.home_score)||0,ag=parseInt(g.away_score)||0;
    t.p++;
    if(h===name){t.gf+=hg;t.ga+=ag;if(hg>ag){t.w++;t.pts+=3;}else if(ag>hg)t.l++;else{t.d++;t.pts++;}}
    else{t.gf+=ag;t.ga+=hg;if(ag>hg){t.w++;t.pts+=3;}else if(hg>ag)t.l++;else{t.d++;t.pts++;}}
  });
  const flagSrc=CC[name]?`https://flagcdn.com/h120/${CC[name]}.png`:'';
  document.getElementById('tTtl').textContent=name;
  document.getElementById('tHero').innerHTML=`
    <div class="tmhdr">
      ${flagSrc?`<img src="${flagSrc}" class="tm-flag-big" alt="${name}" onerror="this.outerHTML='<div style=font-size:52px;margin-bottom:10px>🏳️</div>'">`:'<div style="font-size:52px;margin-bottom:10px">🏳️</div>'}
      <div class="tmname">${name}</div>
      <div class="tmgrp">Group ${grp}</div>
    </div>
    <div class="tmstats">
      <div class="tmc"><div class="tmcv">${t.pts}</div><div class="tmcl">Pts</div></div>
      <div class="tmc"><div class="tmcv">${t.w}</div><div class="tmcl">Won</div></div>
      <div class="tmc"><div class="tmcv">${t.d}</div><div class="tmcl">Draw</div></div>
      <div class="tmc"><div class="tmcv">${t.l}</div><div class="tmcl">Lost</div></div>
    </div>`;

  const played=G.filter(g=>(isDone(g)||isLive(g))&&(g.home_team_name_en===name||g.away_team_name_en===name));
  document.getElementById('ts0').innerHTML=played.length
    ?played.map(g=>{
        const ih=g.home_team_name_en===name;
        const sc=ih?parseInt(g.home_score)||0:parseInt(g.away_score)||0;
        const cc=ih?parseInt(g.away_score)||0:parseInt(g.home_score)||0;
        const opp=ih?g.away_team_name_en:g.home_team_name_en;
        const r=sc>cc?'W':sc<cc?'L':'D';
        const c=r==='W'?'#1b5e20':r==='L'?'#b71c1c':'#607d6b';
        const scorers=parseScorers(ih?g.home_scorers:g.away_scorers);
        const oppFlag=CC[opp]?`<img src="https://flagcdn.com/h32/${CC[opp]}.png" style="width:24px;height:16px;object-fit:cover;border-radius:3px;border:1px solid rgba(0,0,0,.1)" alt="" onerror="this.style.display='none'">`:''
        return`<div class="rrow">
          <div class="rr" style="color:${c}">${r}</div>
          ${oppFlag}
          <div class="ropp">${opp||'TBD'}${scorers.length?`<br><small style="color:var(--mu);font-size:10px;font-weight:500">${scorers.join(' · ')}</small>`:''}
          </div>
          <div class="rsc">${sc}–${cc}</div>
        </div>`;
      }).join('')
    :'<div style="color:var(--mu);font-size:13px;text-align:center;padding:20px">No matches played yet</div>';

  const pl=SQ[name]||[];
  if(pl.length){
    const posG={GK:[],DF:[],MD:[],FW:[]};
    pl.forEach(p=>{const[n,pos]=p.split('|');if(posG[pos])posG[pos].push(n);});
    const posL={GK:'Goalkeepers',DF:'Defenders',MD:'Midfielders',FW:'Forwards'};
    const posC={GK:'#c62828',DF:'#2e7d32',MD:'#1565c0',FW:'#e65100'};
    document.getElementById('ts1').innerHTML='<div>'+['GK','DF','MD','FW'].map(pos=>{
      if(!posG[pos].length)return'';
      return`<div style="margin-bottom:16px">
        <div style="font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:${posC[pos]};padding-bottom:6px;border-bottom:1px solid var(--brd);margin-bottom:8px">${posL[pos]}</div>
        ${posG[pos].map(n=>`<div class="lu-row"><span class="ptag p${pos}">${pos}</span><span class="pnm">${n}</span></div>`).join('')}
      </div>`;
    }).join('')+'</div>';
  } else {
    document.getElementById('ts1').innerHTML='<div style="color:var(--mu);font-size:13px;text-align:center;padding:24px 0">Squad data added as matches are played</div>';
  }

  tTab(0);
  document.getElementById('tOvl').classList.add('on');
  document.body.style.overflow='hidden';
}

loadAll();
</script>
</body>
</html>
