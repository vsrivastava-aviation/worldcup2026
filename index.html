<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚽ World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a6b1a;--card:#ffffff;--hdr:#0d3d0d;--brd:#c8e6c9;--brd2:#a5d6a7;--ac:#00c853;--gold:#ffc107;--rd:#e53935;--mu:#5a7a5a;--tx:#0d2b0d;--tx2:#1b5e20;--lv:#00c853}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Poppins',sans-serif;background:var(--bg);background-image:repeating-linear-gradient(0deg,transparent,transparent 55px,rgba(0,0,0,.04) 55px,rgba(0,0,0,.04) 56px),repeating-linear-gradient(90deg,transparent,transparent 55px,rgba(0,0,0,.04) 55px,rgba(0,0,0,.04) 56px);color:var(--tx);min-height:100vh}

/* HEADER */
header{background:linear-gradient(180deg,#072107,#0d3d0d);border-bottom:2px solid rgba(0,200,83,.2);position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.brand{display:flex;align-items:center;gap:10px}
.btitle{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;background:linear-gradient(90deg,#69f0ae,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.bsub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:2px;margin-top:1px}
.hright{display:flex;align-items:center;gap:8px}
.rfbtn{width:36px;height:36px;border-radius:10px;background:rgba(105,240,174,.15);border:1px solid rgba(105,240,174,.3);color:#69f0ae;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rfbtn:active{opacity:.6}
.rfbtn.spin{animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.updtxt{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.2px;white-space:nowrap}
.updtxt b{color:#69f0ae}
.tabs{display:flex;border-top:1px solid rgba(255,255,255,.07);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:9px 4px;border:none;background:none;color:rgba(255,255,255,.45);font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tab.on{color:#69f0ae;border-bottom-color:#69f0ae}

/* PAGES */
.pg{padding:13px 12px 80px;max-width:440px;margin:0 auto;display:none}
.pg.on{display:block}
.sec{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin:18px 0 10px}
.sec:first-child{margin-top:4px}
.sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
.ldot{display:inline-block;width:7px;height:7px;background:#00e676;border-radius:50%;box-shadow:0 0 6px #00e676;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* FLAG */
.fi{width:28px;height:19px;object-fit:cover;border-radius:3px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.fi.lg{width:40px;height:27px;border-radius:5px}

/* RESULT CARD */
.rc{background:var(--card);border-radius:16px;margin-bottom:10px;box-shadow:0 3px 14px rgba(0,0,0,.18);overflow:hidden;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s,transform .1s}
.rc:active{transform:scale(.98);border-color:#00c853}
.rc.live{border-color:#00c85360;background:#f1fff5}
.rch{background:var(--hdr);padding:7px 13px;display:flex;justify-content:space-between;align-items:center}
.rcmeta{font-size:9px;color:rgba(255,255,255,.6);font-weight:500;letter-spacing:.3px}
.bdg{font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px}
.bft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.blv{background:rgba(0,230,118,.2);color:#00e676}
.rcb{padding:14px 13px 11px}
.mrow{display:flex;align-items:center;gap:5px}
.tcol{flex:1;display:flex;align-items:center;gap:7px;min-width:0;max-width:40%}
.tcol.r{flex-direction:row-reverse;text-align:right}
.tinfo{display:flex;flex-direction:column;gap:1px;min-width:0}
.tcol.r .tinfo{align-items:flex-end}
.tname{font-size:11px;font-weight:800;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.2}
.tname.w{color:#145214}
.tcode{font-size:8px;font-weight:600;color:var(--mu)}
.smid{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;min-width:80px}
.spair{display:flex;align-items:center;gap:4px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--tx);min-width:22px;text-align:center}
.sn.w{color:#145214}
.sn.lv{color:#00a844}
.sdash{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#c8e6c9}
.ftlbl{font-size:8px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.ftlbl.lv{color:#00a844}
.scrow{display:flex;justify-content:space-between;gap:8px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--brd2)}
.sccol{flex:1;font-size:9px;color:#4a7a4a;line-height:1.8;font-weight:500}
.sccol.r{text-align:right}
.sccol b{color:var(--tx);font-weight:700}
.showmore{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.2);border-radius:12px;padding:12px;text-align:center;cursor:pointer;color:rgba(255,255,255,.6);font-size:11px;font-weight:700;margin-bottom:10px}

/* SCHEDULE CARD */
.scd{background:var(--card);border-radius:16px;margin-bottom:12px;box-shadow:0 3px 14px rgba(0,0,0,.18);overflow:hidden;position:relative}
.scd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00c853,#ffc107,#00c853)}
.scdh{background:var(--hdr);padding:8px 13px;display:flex;justify-content:space-between;align-items:center}
.scdrnd{font-size:9px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.3px}
.scdtime{background:linear-gradient(135deg,#ffc107,#ff8f00);color:#3e2000;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.scdb{padding:16px 13px}
.scdteams{display:flex;align-items:center;justify-content:space-between;gap:6px}
.scdteam{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;max-width:42%}
.scdflag{width:62px;height:42px;object-fit:cover;border-radius:7px;border:1px solid rgba(0,0,0,.1);box-shadow:0 2px 8px rgba(0,0,0,.18)}
.scdname{font-size:12px;font-weight:800;color:var(--tx);text-align:center;line-height:1.3}
.scdvs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#c8e6c9;letter-spacing:2px}

/* GROUPS */
.gc{background:var(--card);border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.18)}
.ghdr{background:var(--hdr);padding:10px 14px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:#fff}
.grow{display:flex;align-items:center;padding:10px 13px;gap:8px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s}
.grow:last-child{border-bottom:none}
.grow:active{background:#f1f8e9}
.gpos{width:16px;text-align:center;font-size:11px;font-weight:800;color:var(--mu);flex-shrink:0}
.gpos.q{color:#145214}
.gname{flex:1;font-size:12px;font-weight:700;color:var(--tx)}
.grec{font-size:9px;color:var(--mu);font-weight:600;min-width:60px;text-align:right}
.gpts{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#145214;min-width:22px;text-align:right}

/* ── BRACKET ── */
#p2{padding:0;max-width:none}
.bkt-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 8px 40px}
.bkt-inner{display:flex;align-items:stretch;position:relative}
.bkt-round{display:flex;flex-direction:column;flex-shrink:0;width:148px}
.bkt-rhdr{font-size:7px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);text-align:center;padding:4px 6px;margin:0 4px 8px;background:rgba(255,193,7,.1);border-radius:6px;white-space:nowrap}
.bkt-col{flex:1;display:flex;flex-direction:column;justify-content:space-around;padding:0 4px}
/* connector column */
.bkt-conn{width:32px;flex-shrink:0;position:relative;align-self:stretch}
.bkt-conn svg{position:absolute;top:0;left:0;overflow:visible}

/* match card */
.bkm{background:#fff;border-radius:9px;margin:2px 0;overflow:hidden;border:1.5px solid #c8e6c9;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.bkm.done{border-left:3px solid #145214}
.bkm.pen{border-left:3px solid #ffc107}
.bkm.live{border-left:3px solid #00c853;background:#f0fff4}
.bkm.tap{cursor:pointer}
.bkm.tap:active{border-color:#00c853}
.bkrow{display:flex;align-items:center;gap:4px;padding:4px 6px;border-bottom:1px solid #e8f5e9;min-height:24px}
.bkrow:last-of-type{border-bottom:none}
.bkfl{width:16px;height:11px;object-fit:cover;border-radius:2px;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.bkname{font-size:8.5px;font-weight:700;color:#0d2b0d;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.bkname.w{color:#145214;font-weight:900}
.bkname.tbd{color:#607d6b;font-style:italic;font-weight:500;font-size:7.5px}
.bksc{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#0d2b0d;min-width:10px;text-align:right;flex-shrink:0}
.bksc.w{color:#145214}
.bkpen{font-size:7px;font-weight:800;color:#c8930a;text-align:center;padding:1px 4px;background:rgba(255,193,7,.12);letter-spacing:.3px}
.bkdate{font-size:7px;color:#607d6b;text-align:center;padding:2px 4px;background:#f9fbe7;border-top:1px solid #e8f5e9;font-weight:600;letter-spacing:.2px}
.bkfl-ph{width:16px;height:11px;display:inline-block;flex-shrink:0}

/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px)}
.ovl.on{display:flex}
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;border-top:3px solid #00c853;box-shadow:0 -8px 40px rgba(0,0,0,.4)}
.drag{width:38px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 0}
.shhdr{padding:11px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:5}
.shttl{font-size:14px;font-weight:800;color:var(--tx)}
.cls{width:30px;height:30px;background:#f1f8e9;border:1px solid var(--brd);border-radius:8px;color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.stabs{display:flex;border-bottom:1px solid var(--brd);position:sticky;top:51px;background:#fff;z-index:4}
.stab{flex:1;padding:10px 4px;border:none;background:none;font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;text-align:center;text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.stab.on{color:#145214;border-bottom-color:#00c853}
.spg{padding:15px 18px 36px;display:none}
.spg.on{display:block}
/* match hero */
.mhero{background:linear-gradient(135deg,#0d3d0d,#145214);padding:18px 14px 14px}
.mhrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mteam{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;max-width:40%}
.mflag{width:54px;height:36px;object-fit:cover;border-radius:7px;border:1px solid rgba(255,255,255,.15);box-shadow:0 3px 10px rgba(0,0,0,.3)}
.mname{font-size:11px;font-weight:800;color:#fff;text-align:center;line-height:1.3}
.mname.w{color:var(--gold)}
.mscore{display:flex;align-items:center;gap:8px;flex-shrink:0}
.msn{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:1;color:#fff;min-width:28px;text-align:center}
.msn.w{color:var(--gold)}
.msn.lv{color:#69f0ae}
.msep{font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(255,255,255,.25)}
.mfoot{text-align:center;margin-top:9px;font-size:9px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.5px}
.live-pill{display:inline-block;background:rgba(0,230,118,.2);color:#69f0ae;font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px;border:1px solid rgba(0,230,118,.3);margin-bottom:6px}
.pen-pill{display:inline-block;background:rgba(255,193,7,.18);color:var(--gold);font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px;border:1px solid rgba(255,193,7,.3);margin-bottom:6px}
/* goals */
.gi{display:flex;align-items:flex-start;gap:9px;padding:10px 0;border-bottom:1px solid var(--brd)}
.gi:last-child{border-bottom:none}
.gico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.gtxt{font-size:12px;flex:1;line-height:1.5;font-weight:700;color:var(--tx)}
.gtag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:2px}
.gtag.h{background:#e8f5e9;color:#1b5e20}
.gtag.a{background:#fff8e1;color:#e65100}
/* stats */
.statblk{background:#f9fbe7;border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:12px}
.stath{display:flex;justify-content:space-between;font-size:10px;font-weight:800;margin-bottom:14px}
.pbar{height:9px;border-radius:5px;overflow:hidden;display:flex;background:#e0e0e0;margin:5px 0}
.ph{background:linear-gradient(90deg,#2e7d32,#43a047)}
.pa{background:linear-gradient(90deg,#e65100,#ff8f00)}
.pnums{display:flex;justify-content:space-between;margin-bottom:14px}
.pn{font-size:14px;font-weight:900}
.pn.h{color:#1b5e20}.pn.a{color:#e65100}
.srow{display:grid;grid-template-columns:36px 1fr 36px;gap:6px;align-items:center;margin-bottom:4px}
.sv{font-size:14px;font-weight:800;text-align:center}
.sv.h{color:#1b5e20}.sv.a{color:#e65100}
.slbl{font-size:8px;font-weight:600;color:var(--mu);text-align:center;letter-spacing:.3px;text-transform:uppercase}
.sbar{height:4px;border-radius:2px;overflow:hidden;display:flex;background:#e0e0e0;grid-column:1/-1;margin-bottom:6px}
.sh2{background:#43a047;margin-left:auto}.sa2{background:#ff8f00}
/* lineup */
.lugrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lucol{background:#f9fbe7;border:1px solid var(--brd);border-radius:11px;overflow:hidden}
.luhd{padding:8px 11px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--brd)}
.luhd.h{color:#fff;background:var(--hdr)}
.luhd.a{color:#fff;background:#bf360c}
.lurow{display:flex;align-items:center;gap:6px;padding:6px 11px;border-bottom:1px solid #e8f5e9}
.lurow:last-child{border-bottom:none}
.ptag{font-size:8px;font-weight:800;padding:2px 4px;border-radius:3px;min-width:22px;text-align:center;flex-shrink:0}
.pGK{background:#ffebee;color:#c62828}
.pDF{background:#e8f5e9;color:#2e7d32}
.pMD{background:#e3f2fd;color:#1565c0}
.pFW{background:#fff8e1;color:#e65100}
.pnm{font-size:10px;font-weight:600;color:var(--tx)}
/* team modal */
.tmhdr{background:linear-gradient(135deg,#0d3d0d,#145214);padding:22px 18px;text-align:center}
.tmfl{font-size:56px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.5));margin-bottom:8px}
.tmnm{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;background:linear-gradient(90deg,#69f0ae,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tmgrp{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:2px;margin-top:3px}
.tmst{display:grid;grid-template-columns:repeat(4,1fr);background:#f1f8e9;border-bottom:1px solid var(--brd)}
.tmc{padding:13px 4px;text-align:center;border-right:1px solid var(--brd)}
.tmc:last-child{border-right:none}
.tmcv{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#145214}
.tmcl{font-size:8px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.rrow{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--brd)}
.rrow:last-child{border-bottom:none}
.rr{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:18px;font-weight:900}
.rop{flex:1;font-size:12px;font-weight:700;color:var(--tx)}
.rsc{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--tx)}
.msg{text-align:center;padding:36px 20px;color:rgba(255,255,255,.5);font-size:12px;line-height:2;font-weight:500}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="brand">
      <div>
        <div class="btitle">🏆 WORLD CUP 2026</div>
        <div class="bsub">USA · MEXICO · CANADA</div>
      </div>
    </div>
    <div class="hright">
      <div class="updtxt" id="updtxt">Tap ↻</div>
      <button class="rfbtn" id="rfbtn" onclick="loadAll()">↻</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goTab(0)">Results</button>
    <button class="tab"    onclick="goTab(1)">Schedule</button>
    <button class="tab"    onclick="goTab(2)">Bracket</button>
    <button class="tab"    onclick="goTab(3)">Groups</button>
  </div>
</header>

<div class="pg on" id="p0"><div class="msg">Tap ↻ to load</div></div>
<div class="pg"    id="p1"></div>
<div class="pg"    id="p2"></div>
<div class="pg"    id="p3"></div>

<!-- Match modal -->
<div class="ovl" id="mOvl" onclick="if(event.target===this)closeM()">
  <div class="sheet">
    <div class="drag"></div>
    <div class="shhdr"><div class="shttl" id="mTtl">Match</div><button class="cls" onclick="closeM()">✕</button></div>
    <div id="mHero"></div>
    <div class="stabs">
      <button class="stab on" onclick="mTab(0)">⚽ Goals</button>
      <button class="stab"    onclick="mTab(1)">📊 Stats</button>
      <button class="stab"    onclick="mTab(2)">👕 Lineups</button>
    </div>
    <div class="spg on" id="ms0"></div>
    <div class="spg"    id="ms1"></div>
    <div class="spg"    id="ms2"></div>
  </div>
</div>

<!-- Team modal -->
<div class="ovl" id="tOvl" onclick="if(event.target===this)closeT()">
  <div class="sheet">
    <div class="drag"></div>
    <div class="shhdr"><div class="shttl" id="tTtl">Team</div><button class="cls" onclick="closeT()">✕</button></div>
    <div id="tHero"></div>
    <div class="stabs">
      <button class="stab on" onclick="tTab(0)">📋 Results</button>
      <button class="stab"    onclick="tTab(1)">👥 Squad</button>
    </div>
    <div class="spg on" id="ts0"></div>
    <div class="spg"    id="ts1"></div>
  </div>
</div>

<script>
'use strict';

function goTab(n){document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===n));[0,1,2,3].forEach(i=>document.getElementById('p'+i).classList.toggle('on',i===n));if(n===2)setTimeout(drawConnectors,120);}
function mTab(n){document.querySelectorAll('#mOvl .stab').forEach((el,i)=>el.classList.toggle('on',i===n));[0,1,2].forEach(i=>document.getElementById('ms'+i).classList.toggle('on',i===n));}
function tTab(n){document.querySelectorAll('#tOvl .stab').forEach((el,i)=>el.classList.toggle('on',i===n));[0,1].forEach(i=>document.getElementById('ts'+i).classList.toggle('on',i===n));}
function closeM(){document.getElementById('mOvl').classList.remove('on');document.body.style.overflow='';}
function closeT(){document.getElementById('tOvl').classList.remove('on');document.body.style.overflow='';}

function sn(n){return SHORT[n]||n;}
function tla(n){return TLA[n]||n.slice(0,3).toUpperCase();}
function fl(n,cls){const c=CC[n];if(!c)return'';return`<img src="https://flagcdn.com/h40/${c}.png" class="${cls||'fi'}" alt="${n}" onerror="this.style.display='none'">`;  }
function fixName(r){for(const[b,g]of Object.entries(NAME_FIX))if(r.includes(b))r=r.replace(b,g);return r;}
function parseScorers(raw){if(!raw||raw==='null')return[];return raw.replace(/^\{|\}$/g,'').split('","').map(s=>s.replace(/^"|"$/g,'').replace(/\\"/g,'"').trim()).filter(Boolean).map(fixName);}
function isDone(g){return g.finished==='TRUE'||g.time_elapsed==='finished'||g.time_elapsed==='Finished';}
function isLive(g){const t=g.time_elapsed;return t&&t!=='notstarted'&&t!=='finished'&&t!=='Finished'&&g.finished!=='TRUE';}
function isGroup(g){return g.type==='group';}
function getPen(g){const h=g.home_penalty_score,a=g.away_penalty_score;if(h==null||a==null||h==='null'||a==='null')return null;const hp=parseInt(h),ap=parseInt(a);if(isNaN(hp)||isNaN(ap))return null;return{h:hp,a:ap};}

function getMs(g){
  try{const[dp,tp]=g.local_date.split(' ');const[mo,da,yr]=dp.split('/');const[hr,mn]=tp.split(':');const tz=STZ[g.stadium_id]||(-4);return Date.UTC(+yr,+mo-1,+da,+hr,+mn)-(tz*3600000);}
  catch(e){return Date.now();}
}
function fmtIST(ms){return new Date(ms).toLocaleString('en-IN',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});}
function fmtTime(ms){return new Date(ms).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'}).toUpperCase();}
function fmtDate(ms){return new Date(ms).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:'Asia/Kolkata'});}
function fmtShortIST(ms){return new Date(ms).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});}
const KO={r32:'Round of 32',r16:'Round of 16',qf:'Quarter-Final',sf:'Semi-Final',final:'🏆 Final',third:'3rd Place'};

async function loadAll(){
  const btn=document.getElementById('rfbtn');
  btn.classList.add('spin');
  document.getElementById('updtxt').textContent='Loading…';
  try{
    const res=await fetch(W+'?endpoint=games&t='+Date.now());
    const json=await res.json();
    G=json.games||[];
    if(!G.length)throw new Error('No data');
    showAll=false;
    render();
    const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
    document.getElementById('updtxt').innerHTML='<b>'+t+' IST</b>';
  }catch(e){
    document.getElementById('updtxt').textContent='⚠️ Failed';
    document.getElementById('p0').innerHTML='<div class="msg">⚠️ '+e.message+'<br><br>Tap ↻ to retry</div>';
  }
  btn.classList.remove('spin');
}

function render(){
  const live=G.filter(isLive);
  const done=G.filter(isDone).sort((a,b)=>getMs(b)-getMs(a));
  const sched=G.filter(g=>!isDone(g)&&!isLive(g)&&(g.home_team_name_en||g.home_team_label)).sort((a,b)=>getMs(a)-getMs(b));

  // RESULTS
  let r='';
  if(live.length) r+='<div class="sec"><span class="ldot"></span>Live Now</div>'+live.map(resCard).join('');
  if(done.length){
    const recent=done.slice(0,6),older=done.slice(6);
    r+='<div class="sec">Recent Results</div>'+recent.map(resCard).join('');
    if(older.length){
      if(showAll){r+=older.map(resCard).join('');r+=`<div class="showmore" onclick="showAll=false;render()">▲ Show Less</div>`;}
      else r+=`<div class="showmore" onclick="showAll=true;render()">▼ Show ${older.length} More Results</div>`;
    }
  }
  document.getElementById('p0').innerHTML=r||'<div class="msg">No results yet</div>';

  // SCHEDULE
  const byD={};
  sched.forEach(g=>{const dk=new Date(getMs(g)).toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});if(!byD[dk])byD[dk]=[];byD[dk].push(g);});
  let s='';
  Object.keys(byD).sort().forEach(dk=>{
    s+=`<div class="sec">${fmtDate(getMs({local_date:dk.split('-').reverse().join('/')+' 12:00',stadium_id:'4'}) || Date.parse(dk+' 12:00:00 UTC'))}</div>`;
    byD[dk].forEach(g=>{s+=schedCard(g);});
  });
  // Fix: use proper date formatting for schedule headers
  s='';
  Object.keys(byD).sort().forEach(dk=>{
    const[yr,mo,da]=dk.split('-');
    const ms=Date.UTC(+yr,+mo-1,+da,12,0);
    const lbl=new Date(ms).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'});
    s+=`<div class="sec">${lbl}</div>`;
    byD[dk].forEach(g=>{s+=schedCard(g);});
  });
  document.getElementById('p1').innerHTML=s||'<div class="msg">No upcoming matches</div>';

  renderBracket();
  renderGroups();
}

function resCard(g){
  const live=isLive(g),ko=['r32','r16','qf','sf','final','third'].includes(g.type);
  const h=g.home_team_name_en||g.home_team_label||'TBD',a=g.away_team_name_en||g.away_team_label||'TBD';
  const hs=parseInt(g.home_score)||0,as=parseInt(g.away_score)||0;
  const pen=getPen(g);
  const w=pen?(pen.h>pen.a?h:a):(hs>as?h:as>hs?a:null);
  const hw=w===h,aw=w===a;
  const s1=parseScorers(g.home_scorers),s2=parseScorers(g.away_scorers);
  const rnd=ko?(KO[g.type]||g.group):`Group ${g.group} · MD${g.matchday}`;
  return`<div class="rc ${live?'live':''}" onclick="openMatch('${g.id}')">
    <div class="rch"><div class="rcmeta">${rnd} · ${fmtIST(getMs(g))}</div>${live?'<span class="bdg blv"><span class="ldot"></span>LIVE</span>':'<span class="bdg bft">'+(pen?'FT-PENS':'FT')+'</span>'}</div>
    <div class="rcb">
      <div class="mrow">
        <div class="tcol">${fl(h,'fi lg')}<div class="tinfo"><div class="tname ${hw?'w':''}">${sn(h)}</div><div class="tcode">${tla(h)}</div></div></div>
        <div class="smid"><div class="spair"><div class="sn ${hw?'w':live?'lv':''}">${hs}</div><div class="sdash">–</div><div class="sn ${aw?'w':live?'lv':''}">${as}</div></div><div class="ftlbl ${live?'lv':''}">${live?'🟢 LIVE':pen?`PENS ${pen.h}-${pen.a}`:'FULL TIME'}</div></div>
        <div class="tcol r">${fl(a,'fi lg')}<div class="tinfo"><div class="tname ${aw?'w':''}">${sn(a)}</div><div class="tcode">${tla(a)}</div></div></div>
      </div>
      ${(s1.length||s2.length)?`<div class="scrow"><div class="sccol">${s1.map(s=>`<b>${s}</b>`).join('<br>')}</div><div class="sccol r">${s2.map(s=>`<b>${s}</b>`).join('<br>')}</div></div>`:''}
    </div>
  </div>`;
}

function schedCard(g){
  const ko=['r32','r16','qf','sf','final','third'].includes(g.type);
  const h=g.home_team_name_en||g.home_team_label||'TBD',a=g.away_team_name_en||g.away_team_label||'TBD';
  const ms=getMs(g),rnd=ko?(KO[g.type]||g.group):`Group ${g.group} · MD${g.matchday}`;
  const hc=CC[h],ac=CC[a];
  return`<div class="scd">
    <div class="scdh"><div class="scdrnd">${rnd}</div><div class="scdtime">${fmtTime(ms)} IST</div></div>
    <div class="scdb"><div class="scdteams">
      <div class="scdteam">${hc?`<img src="https://flagcdn.com/h80/${hc}.png" class="scdflag" alt="${h}" onerror="this.style.display='none'">`:'<span style="font-size:40px">🏳️</span>'}<div class="scdname">${sn(h)}</div></div>
      <div><div class="scdvs">VS</div></div>
      <div class="scdteam">${ac?`<img src="https://flagcdn.com/h80/${ac}.png" class="scdflag" alt="${a}" onerror="this.style.display='none'">`:'<span style="font-size:40px">🏳️</span>'}<div class="scdname">${sn(a)}</div></div>
    </div></div>
  </div>`;
}

  ['73','76'],  // → R16 #89  (S.Africa/Canada + Brazil/Japan)

  ['79','80'],  // → R16 #92  (Mexico/Ecuador + England/DRCongo)
  ['81','82'],  // → R16 #94  (USA/Bosnia + Belgium/Senegal)
  ['83','84'],  // → R16 #93  (Portugal/Croatia + Spain/Austria)
  ['85','87'],  // → R16 #96  (Switzerland/Algeria + Colombia/Ghana)
  ['86','88'],  // → R16 #95  (Argentina/CapeVerde + Australia/Egypt)
];
const R16_IDS = ['89','90','91','92','94','93','96','95'];
const QF_IDS  = ['97','99','98','100'];
const SF_IDS  = ['101','102'];
const FIN_IDS = ['104'];

function bktWinner(g){
  if(!g||!isDone(g))return null;
  const pen=getPen(g);
  if(pen)return pen.h>pen.a?g.home_team_name_en:g.away_team_name_en;
  const hs=parseInt(g.home_score)||0,as=parseInt(g.away_score)||0;
  return hs>as?g.home_team_name_en:as>hs?g.away_team_name_en:null;
}

function bktTeamName(g, side){
  // For knockout games, show winner name if available from previous round
  const name = side==='h'?(g.home_team_name_en||g.home_team_label):(g.away_team_name_en||g.away_team_label);
  return name||'TBD';
}

function bktCard(g){
  if(!g)return`<div class="bkm" style="min-height:64px;opacity:.3"></div>`;
  const done=isDone(g),live=isLive(g);

  const w=bktWinner(g);
  const hw=w&&w===g.home_team_name_en,aw=w&&w===g.away_team_name_en;
  const isTBDh=!g.home_team_name_en||h.startsWith('Winner')||h.startsWith('Runner')||h.startsWith('Loser')||h.startsWith('3rd');
  const isTBDa=!g.away_team_name_en||a.startsWith('Winner')||a.startsWith('Runner')||a.startsWith('Loser')||a.startsWith('3rd');
  const dh=isTBDh?h.replace(/Winner Match /,'M').replace(/Winner Group /,'Grp ').replace(/Runner-up /,'2nd ').replace(/3rd Group/,'3rd'):sn(h);
  const da=isTBDa?a.replace(/Winner Match /,'M').replace(/Winner Group /,'Grp ').replace(/Runner-up /,'2nd ').replace(/3rd Group/,'3rd'):sn(a);
  const cls=(pen?'pen':live?'live':done?'done':'')+(done||live?' tap':'');
  const showSc=done||live;
  const hflag=!isTBDh&&CC[h]?`<img class="bkfl" src="https://flagcdn.com/h32/${CC[h]}.png" alt="" onerror="this.style.display='none'">`:
    !isTBDh&&CC[sn(h)]?`<img class="bkfl" src="https://flagcdn.com/h32/${CC[sn(h)]}.png" alt="" onerror="this.style.display='none'">`:
    `<span style="width:16px;height:11px;display:inline-block;flex-shrink:0"></span>`;
  const aflag=!isTBDa&&CC[a]?`<img class="bkfl" src="https://flagcdn.com/h32/${CC[a]}.png" alt="" onerror="this.style.display='none'">`:
    !isTBDa&&CC[sn(a)]?`<img class="bkfl" src="https://flagcdn.com/h32/${CC[sn(a)]}.png" alt="" onerror="this.style.display='none'">`:
    `<span style="width:16px;height:11px;display:inline-block;flex-shrink:0"></span>`;

  return`<div class="bkm ${cls}" ${done||live?`onclick="openMatch('${g.id}')"`:''}>
    <div class="bkrow">${hflag}<span class="bkname ${hw?'w':''} ${isTBDh?'tbd':''}">${dh}</span>${showSc?`<span class="bksc ${hw?'w':''}">${hs}</span>`:''}</div>
    <div class="bkrow">${aflag}<span class="bkname ${aw?'w':''} ${isTBDa?'tbd':''}">${da}</span>${showSc?`<span class="bksc ${aw?'w':''}">${as}</span>`:''}</div>
    ${pen?`<div class="bkpen">PENS ${pen.h}–${pen.a}</div>`:''}
    <div class="bkdate">${fmtShortIST(getMs(g))} IST</div>
  </div>`;
}


// ══════════════════════════════════════════════════
// BRACKET — CSS Grid with precise row positioning
// Each R32 = 2 rows, R16 centred between its 2 R32s
// ══════════════════════════════════════════════════

// R32 pairs → R16 mapping (verified from live API):
// Pair[0]: R32#73 + R32#76 → R16#89
// Pair[1]: R32#74 + R32#77 → R16#90
// Pair[2]: R32#75 + R32#78 → R16#91
// Pair[3]: R32#79 + R32#80 → R16#92
// Pair[4]: R32#81 + R32#82 → R16#94
// Pair[5]: R32#83 + R32#84 → R16#93
// Pair[6]: R32#85 + R32#87 → R16#96
// Pair[7]: R32#86 + R32#88 → R16#95
// R16 pairs → QF: [89+90→97], [91+92→99], [94+93→98], [96+95→100]
// QF pairs  → SF: [97+99→101], [98+100→102]
// SF → Final: [101+102→104]

const BKT = {
  r32pairs: [
    ['73','76'], ['74','77'], ['75','78'], ['79','80'],
    ['81','82'], ['83','84'], ['85','87'], ['86','88']
  ],
  r16: ['89','90','91','92','94','93','96','95'],
  qf:  ['97','99','98','100'],
  sf:  ['101','102'],
  fin: ['104']
};

function renderBracket(){
  const gm = id => G.find(g=>g.id===id) || null;

  function bktWin(g){
    if(!g||!isDone(g))return null;
    const pen=getPen(g);
    if(pen)return pen.h>pen.a?g.home_team_name_en:g.away_team_name_en;
    const hs=parseInt(g.home_score)||0,as=parseInt(g.away_score)||0;
    return hs>as?g.home_team_name_en:as>hs?g.away_team_name_en:null;
  }

  function teamFlag(name){
    if(!name)return'<span class="bkfl-ph"></span>';
    const c=CC[name]||CC[sn(name)];
    if(!c)return'<span class="bkfl-ph"></span>';
    return`<img class="bkfl" src="https://flagcdn.com/h32/${c}.png" alt="" onerror="this.style.display='none'">`;
  }

  function dispName(rawName, isTBD){
    if(isTBD){
      return rawName
        .replace('Winner Match ','M')
        .replace('Runner-up Group ','2nd ')
        .replace('Winner Group ','Grp ')
        .replace('3rd Group','3rd ')
        .replace('Loser Match ','L');
    }
    return sn(rawName);
  }

  function bkCard(g, rowStart, rowEnd, col){
    if(!g){
      return`<div class="bkm" style="grid-column:${col};grid-row:${rowStart}/${rowEnd}"></div>`;
    }
    const done=isDone(g), live=isLive(g);
    const h=g.home_team_name_en||g.home_team_label||'TBD';
    const a=g.away_team_name_en||g.away_team_label||'TBD';
    const hs=parseInt(g.home_score)||0, as2=parseInt(g.away_score)||0;
    const pen=getPen(g);
    const w=bktWin(g);
    const hw=w&&w===g.home_team_name_en, aw=w&&w===g.away_team_name_en;
    const isTBDh=!g.home_team_name_en||h.startsWith('Winner')||h.startsWith('Runner')||h.startsWith('Loser')||h.startsWith('3rd');
    const isTBDa=!g.away_team_name_en||a.startsWith('Winner')||a.startsWith('Runner')||a.startsWith('Loser')||a.startsWith('3rd');
    const dh=dispName(h,isTBDh), da=dispName(a,isTBDa);
    const showSc=done||live;
    const cls=(pen?'pen':live?'live':done?'done':'')+(done||live?' tap':'');
    const onclick=done||live?`onclick="openMatch('${g.id}')"`:'' ;
    const ms=getMs(g);
    return`<div class="bkm ${cls}" style="grid-column:${col};grid-row:${rowStart}/${rowEnd}" ${onclick}>
      <div class="bkrow">
        ${teamFlag(isTBDh?null:h)}
        <span class="bkname ${hw?'w':''} ${isTBDh?'tbd':''}">${dh}</span>
        ${showSc?`<span class="bksc ${hw?'w':''}">${hs}</span>`:''}
      </div>
      <div class="bkrow">
        ${teamFlag(isTBDa?null:a)}
        <span class="bkname ${aw?'w':''} ${isTBDa?'tbd':''}">${da}</span>
        ${showSc?`<span class="bksc ${aw?'w':''}">${as2}</span>`:''}
      </div>
      ${pen?`<div class="bkpen">PENS ${pen.h}–${pen.a}</div>`:''}
      <div class="bkdate">${fmtShortIST(ms)}</div>
    </div>`;
  }

  // Row formula:
  // R32[i]: rows (i*2+1) to (i*2+3)
  // R16[i]: rows (i*4+2) to (i*4+6)   — centred between R32[i*2] and R32[i*2+1]
  // QF[i]:  rows (i*8+4) to (i*8+12)
  // SF[i]:  rows (i*16+8) to (i*16+24)
  // Final:  rows 12 to 22

  let cards = '';

  // R32 — column 1
  const r32flat = BKT.r32pairs.flat(); // 16 ids in order
  for(let i=0;i<16;i++){
    const rs=i*2+1, re=i*2+3;
    cards += bkCard(gm(r32flat[i]), rs, re, 1);
  }

  // R16 — column 3
  for(let i=0;i<8;i++){
    const rs=i*4+2, re=i*4+6;
    cards += bkCard(gm(BKT.r16[i]), rs, re, 3);
  }

  // QF — column 5
  for(let i=0;i<4;i++){
    const rs=i*8+4, re=i*8+12;
    cards += bkCard(gm(BKT.qf[i]), rs, re, 5);
  }

  // SF — column 7
  for(let i=0;i<2;i++){
    const rs=i*16+8, re=i*16+24;
    cards += bkCard(gm(BKT.sf[i]), rs, re, 7);
  }

  // Final — column 9, centred at row 16
  cards += bkCard(gm(BKT.fin[0]), 12, 22, 9);

  // SVG connectors will be drawn after render
  const html = `
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 8px 30px">
    <div style="min-width:800px">
      <div style="display:grid;grid-template-columns:150px 28px 150px 28px 150px 28px 150px 28px 150px;margin-bottom:6px">
        ${['Round of 32','','Round of 16','','Quarter-Finals','','Semi-Finals','','🏆 Final'].map((l,i)=>
          l?`<div style="font-size:7px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#ffc107;text-align:center;padding:4px 6px;background:rgba(255,193,7,.1);border-radius:6px">${l}</div>`
          :'<div></div>'
        ).join('')}
      </div>
      <div id="bktGrid" style="display:grid;grid-template-columns:150px 28px 150px 28px 150px 28px 150px 28px 150px;grid-template-rows:repeat(32,34px);position:relative;gap:2px 0">
        ${cards}
        <svg id="bktSvg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible"></svg>
      </div>
    </div>
  </div>`;

  document.getElementById('p2').innerHTML = html;
  setTimeout(drawBktConnectors, 120);
}

function drawBktConnectors(){
  const grid = document.getElementById('bktGrid');
  const svg  = document.getElementById('bktSvg');
  if(!grid||!svg)return;

  const gr = grid.getBoundingClientRect();
  let paths = '';

  // Helper: get card centre-right and centre-left positions relative to grid
  function cardRight(el){
    const r=el.getBoundingClientRect();
    return{x:r.right-gr.left, y:r.top+r.height/2-gr.top};
  }
  function cardLeft(el){
    const r=el.getBoundingClientRect();
    return{x:r.left-gr.left, y:r.top+r.height/2-gr.top};
  }

  // Get all cards by grid column (col attribute on grid-column style)
  function cardsInCol(col){
    return [...grid.querySelectorAll('.bkm')].filter(el=>{
      const gs=el.style.gridColumn;
      return gs&&parseInt(gs)===col;
    }).sort((a,b)=>{
      return a.getBoundingClientRect().top - b.getBoundingClientRect().top;
    });
  }

  const col1=cardsInCol(1); // R32 (16 cards)
  const col3=cardsInCol(3); // R16 (8 cards)
  const col5=cardsInCol(5); // QF  (4 cards)
  const col7=cardsInCol(7); // SF  (2 cards)
  const col9=cardsInCol(9); // Final (1 card)

  function drawConn(fromCards, toCards, connColX){
    const pairs=toCards.length;
    for(let i=0;i<pairs;i++){
      const f1=fromCards[i*2], f2=fromCards[i*2+1], t=toCards[i];
      if(!f1||!t)continue;
      const p1=cardRight(f1), t1=cardLeft(t);
      const mx=connColX; // midpoint x in connector column
      // From f1 right → horizontal to midpoint → vertical to target y → horizontal to target left
      paths+=`<path d="M${p1.x},${p1.y} H${mx} V${t1.y} H${t1.x}" fill="none" stroke="#a5d6a7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      // From f2 right → horizontal to midpoint (where it meets the vertical above)
      if(f2){
        const p2=cardRight(f2);
        paths+=`<path d="M${p2.x},${p2.y} H${mx}" fill="none" stroke="#a5d6a7" stroke-width="1.5" stroke-linecap="round"/>`;
      }
    }
  }

  // Connector column midpoint X positions
  const colXs = [0, 150, 178, 328, 356, 506, 534, 684, 712]; // approx x of col midpoints
  // Better: compute from actual grid positions
  // col1 right edge ≈ 150, col3 starts at 150+28=178 → connector midpoint = 150+14=164
  // col3 right edge ≈ 178+150=328, col5 starts at 356 → connector midpoint ≈ 342
  // col5 right edge ≈ 506, col7 starts at 534 → connector midpoint ≈ 520
  // col7 right edge ≈ 684, col9 starts at 712 → connector midpoint ≈ 698

  if(col1.length>=2&&col3.length>=1) drawConn(col1,col3,164);
  if(col3.length>=2&&col5.length>=1) drawConn(col3,col5,342);
  if(col5.length>=2&&col7.length>=1) drawConn(col5,col7,520);
  if(col7.length>=2&&col9.length>=1) drawConn(col7,col9,698);

  svg.innerHTML=paths;
}


function renderGroups(){
  const teams={};
  G.filter(isDone).filter(isGroup).forEach(g=>{
    const h=g.home_team_name_en,a=g.away_team_name_en;
    if(!h||!a)return;
    [h,a].forEach(n=>{if(!teams[n])teams[n]={n,grp:g.group,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    const hg=parseInt(g.home_score)||0,ag=parseInt(g.away_score)||0;
    teams[h].p++;teams[a].p++;teams[h].gf+=hg;teams[h].ga+=ag;teams[a].gf+=ag;teams[a].ga+=hg;
    if(hg>ag){teams[h].w++;teams[h].pts+=3;teams[a].l++;}
    else if(ag>hg){teams[a].w++;teams[a].pts+=3;teams[h].l++;}
    else{teams[h].d++;teams[h].pts++;teams[a].d++;teams[a].pts++;}
  });
  G.filter(isGroup).filter(g=>!isDone(g)).forEach(g=>{
    [g.home_team_name_en,g.away_team_name_en].forEach(n=>{if(n&&!teams[n])teams[n]={n,grp:g.group,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  });
  const byG={};
  Object.values(teams).forEach(t=>{if(!byG[t.grp])byG[t.grp]=[];byG[t.grp].push(t);});
  Object.values(byG).forEach(arr=>arr.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf));
  document.getElementById('p3').innerHTML=Object.keys(byG).sort().map(grp=>`
    <div class="gc">
      <div class="ghdr">GROUP ${grp}</div>
      ${byG[grp].map((t,i)=>`<div class="grow" onclick="openTeam('${t.n.replace(/'/g,"\\'")}','${grp}')">
        <div class="gpos ${i<2?'q':''}">${i+1}</div>
        ${fl(t.n,'fi')}
        <div class="gname">${t.n}</div>
        <div class="grec">${t.w}W ${t.d}D ${t.l}L &nbsp;${t.gf}–${t.ga}</div>
        <div class="gpts">${t.pts}</div>
      </div>`).join('')}
    </div>`).join('')||'<div class="msg">Loading…</div>';
}

function openMatch(id){

  const w=pen?(pen.h>pen.a?h:a):(hs>as?h:as>hs?a:null);

    </div>`;
  // Goals
  const s1=parseScorers(g.home_scorers),s2=parseScorers(g.away_scorers);
  const all=[...s1.map(n=>({n,side:'h',t:h})),...s2.map(n=>({n,side:'a',t:a}))];
  let goalsHTML=all.length?all.map(x=>`<div class="gi"><div class="gico">⚽</div><div class="gtxt">${x.n}<br><span class="gtag ${x.side}">${x.t}</span></div></div>`).join('')
    :`<div style="color:var(--mu);font-size:12px;padding:14px 0;text-align:center">${done?'No goals — goalless draw':'Match in progress…'}</div>`;
  if(pen){
    const ps1=parseScorers(g.home_penalty_scorers),ps2=parseScorers(g.away_penalty_scorers);
    const pm1=parseScorers(g.home_penalty_misses),pm2=parseScorers(g.away_penalty_misses);
    const phome=[...ps1.map(n=>({n,ok:true})),...pm1.map(n=>({n,ok:false}))];
    const paway=[...ps2.map(n=>({n,ok:true})),...pm2.map(n=>({n,ok:false}))];
    const max=Math.max(phome.length,paway.length);
    let penRows='';
    for(let i=0;i<max;i++){
      if(phome[i])penRows+=`<div class="gi"><div class="gico">${phome[i].ok?'⚽':'❌'}</div><div class="gtxt">${phome[i].n}<br><span class="gtag h">${h}</span></div></div>`;
      if(paway[i])penRows+=`<div class="gi"><div class="gico">${paway[i].ok?'⚽':'❌'}</div><div class="gtxt">${paway[i].n}<br><span class="gtag a">${a}</span></div></div>`;
    }
    if(penRows)goalsHTML+=`<div class="sec" style="margin-top:16px">🥅 Penalty Shootout ${pen.h}–${pen.a}</div>${penRows}`;
  }
  document.getElementById('ms0').innerHTML=goalsHTML;
  // Stats
  if(done||live){

    const hp=Math.min(68,Math.max(32,50+(hs-as)*8+((seed%10)-5)));
    const ap=100-hp;
    const hsh=Math.max(3,hs*3+(seed%6)+2),ash=Math.max(3,as*3+((seed*3)%6)+2);

      <div class="pnums"><span class="pn h">${hp}%</span><span class="pn a">${ap}%</span></div>
      ${sr('Total Shots',hsh,ash)}${sr('Shots on Target',hs+Math.max(0,Math.round(hsh*.3)),as+Math.max(0,Math.round(ash*.3)))}${sr('Goals',hs,as)}${sr('Corners',Math.max(1,Math.round(hsh*.45)),Math.max(1,Math.round(ash*.45)))}
    </div><div style="font-size:9px;color:var(--mu);text-align:center;font-style:italic">* Possession & shots are estimated</div>`;
  } else {
    document.getElementById('ms1').innerHTML='<div style="color:var(--mu);font-size:12px;text-align:center;padding:20px 0">Stats available when match starts</div>';
  }
  // Lineups
  function luCol(name,side){
    const pl=SQ[name]||[];const grp={GK:[],DF:[],MD:[],FW:[]};
    pl.forEach(p=>{const[n,pos]=p.split('|');if(grp[pos])grp[pos].push(n);});
    const fnc=CC[name];const fi2=fnc?`<img src="https://flagcdn.com/h24/${fnc}.png" style="width:18px;height:12px;object-fit:cover;border-radius:2px" alt="">`:'';
    const rows=['GK','DF','MD','FW'].map(pos=>grp[pos].map(n=>`<div class="lurow"><span class="ptag p${pos}">${pos}</span><span class="pnm">${n}</span></div>`).join('')).join('');
    return`<div class="lucol"><div class="luhd ${side}">${fi2} ${tla(name)}</div>${rows||'<div class="lurow"><span class="pnm" style="color:var(--mu)">TBD</span></div>'}</div>`;
  }
  document.getElementById('ms2').innerHTML=`<div class="lugrid">${luCol(h,'h')}${luCol(a,'a')}</div>`;
  mTab(0);
  document.getElementById('mOvl').classList.add('on');
  document.body.style.overflow='hidden';
}

function openTeam(name,grp){
  const t={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
  G.filter(isDone).forEach(g=>{
    const h=g.home_team_name_en,a=g.away_team_name_en;
    if(h!==name&&a!==name)return;
    const hg=parseInt(g.home_score)||0,ag=parseInt(g.away_score)||0;
    t.p++;
    if(h===name){t.gf+=hg;t.ga+=ag;if(hg>ag){t.w++;t.pts+=3;}else if(ag>hg)t.l++;else{t.d++;t.pts++;}}
    else{t.gf+=ag;t.ga+=hg;if(ag>hg){t.w++;t.pts+=3;}else if(hg>ag)t.l++;else{t.d++;t.pts++;}}
  });
  const tc=CC[name];
  document.getElementById('tTtl').textContent=name;
  document.getElementById('tHero').innerHTML=`
    <div class="tmhdr">
      ${tc?`<img src="https://flagcdn.com/h120/${tc}.png" class="tmfl" style="width:80px;height:54px;object-fit:cover;border-radius:10px;border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 16px rgba(0,0,0,.4);margin-bottom:8px" alt="" onerror="this.style.display='none'">`:'<div class="tmfl">🏳️</div>'}
      <div class="tmnm">${name}</div><div class="tmgrp">Group ${grp}</div>
    </div>
    <div class="tmst">
      <div class="tmc"><div class="tmcv">${t.pts}</div><div class="tmcl">Pts</div></div>
      <div class="tmc"><div class="tmcv">${t.w}</div><div class="tmcl">Won</div></div>
      <div class="tmc"><div class="tmcv">${t.d}</div><div class="tmcl">Draw</div></div>
      <div class="tmc"><div class="tmcv">${t.l}</div><div class="tmcl">Lost</div></div>
    </div>`;
  const played=G.filter(g=>(isDone(g)||isLive(g))&&(g.home_team_name_en===name||g.away_team_name_en===name));
  document.getElementById('ts0').innerHTML=played.length?played.map(g=>{
    const ih=g.home_team_name_en===name;
    const sc=ih?parseInt(g.home_score)||0:parseInt(g.away_score)||0;
    const cc=ih?parseInt(g.away_score)||0:parseInt(g.home_score)||0;
    const opp=ih?g.away_team_name_en:g.home_team_name_en;
    const r=sc>cc?'W':sc<cc?'L':'D';
    const c=r==='W'?'#1b5e20':r==='L'?'#b71c1c':'#607d6b';
    const scorers=parseScorers(ih?g.home_scorers:g.away_scorers);
    const oc=CC[opp];
    return`<div class="rrow"><div class="rr" style="color:${c}">${r}</div>
      ${oc?`<img src="https://flagcdn.com/h32/${oc}.png" style="width:22px;height:15px;object-fit:cover;border-radius:3px;border:1px solid rgba(0,0,0,.1)" alt="" onerror="this.style.display='none'">`:''}
      <div class="rop">${opp||'TBD'}${scorers.length?`<br><small style="color:var(--mu);font-size:9px">${scorers.join(' · ')}</small>`:''}</div>
      <div class="rsc">${sc}–${cc}</div></div>`;
  }).join(''):'<div style="color:var(--mu);font-size:12px;text-align:center;padding:18px">No matches yet</div>';
  const pl=SQ[name]||[];
  if(pl.length){
    const posG={GK:[],DF:[],MD:[],FW:[]};
    pl.forEach(p=>{const[n,pos]=p.split('|');if(posG[pos])posG[pos].push(n);});
    const posL={GK:'Goalkeepers',DF:'Defenders',MD:'Midfielders',FW:'Forwards'};
    const posC={GK:'#c62828',DF:'#2e7d32',MD:'#1565c0',FW:'#e65100'};
    document.getElementById('ts1').innerHTML='<div>'+['GK','DF','MD','FW'].map(pos=>{
      if(!posG[pos].length)return'';
      return`<div style="margin-bottom:14px"><div style="font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:${posC[pos]};padding-bottom:5px;border-bottom:1px solid var(--brd);margin-bottom:7px">${posL[pos]}</div>${posG[pos].map(n=>`<div class="lurow"><span class="ptag p${pos}">${pos}</span><span class="pnm">${n}</span></div>`).join('')}</div>`;
    }).join('')+'</div>';
  } else {
    document.getElementById('ts1').innerHTML='<div style="color:var(--mu);font-size:12px;text-align:center;padding:18px">Squad added as tournament progresses</div>';
  }
  tTab(0);
  document.getElementById('tOvl').classList.add('on');
  document.body.style.overflow='hidden';
}

loadAll();
</script>
</body>
</html>
